server {
    listen 80;
    server_name _;
    client_max_body_size 50m;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;

    # API proxy to backend
    location /api/ {
        proxy_pass http://fastapi-backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
    }

    # System dashboard (React SPA) at /system/
    location = /system {
        return 301 /system/;
    }

    location ^~ /system/ {
        alias /usr/share/nginx/html/system/;
        index index.html;

        # Serve static assets directly
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            try_files $uri =404;
        }

        # SPA fallback for all other /system/ routes
        try_files $uri $uri/ /system/index.html;
    }

    # Landing pages (static HTML from website/)
    root /usr/share/nginx/html/landing;

    location / {
        index index.html;
        try_files $uri $uri/ =404;
    }
}
